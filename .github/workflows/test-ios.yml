name: Test iOS

on:
  workflow_run:
    workflows: [ "Build iOS" ]
    types: [ completed ]

jobs:
  test:
    runs-on: macos-14
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Restore DerivedData from Build
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.workspace }}/derived
          key: xcode-derived-r2r-${{ github.event.workflow_run.head_sha }}

      - name: Test
        run: |
          xcodebuild test \
            -project r2rscorecards.xcodeproj \
            -scheme r2rscorecards \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            -derivedDataPath "${{ runner.workspace }}/derived" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        env:
          DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
